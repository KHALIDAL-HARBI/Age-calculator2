<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>حاسبة أعمار الطلاب المستجدين للعام الدراسي 1448هـ</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-1: #eaf4f1;
            --bg-2: #f9f5eb;
            --card-bg: rgba(255, 255, 255, 0.92);
            --primary: #0b6b5b;
            --primary-dark: #06483e;
            --accent: #c8a96b;
            --accent-soft: #f5ebd8;
            --text: #18312c;
            --muted: #64756f;
            --border: rgba(11, 107, 91, 0.12);
            --shadow: 0 18px 45px rgba(4, 56, 48, 0.12);
            --radius-xl: 26px;
            --radius-lg: 18px;
            --success: #1f7a47;
            --info: #0f6c78;
            --kg: #9c295e;
            --middle: #1c63b7;
            --secondary: #8e6a09;
            --neutral: #546e7a;
            --danger: #455a64;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Cairo", "Segoe UI", Tahoma, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(200, 169, 107, 0.22), transparent 28%),
                radial-gradient(circle at bottom left, rgba(11, 107, 91, 0.18), transparent 32%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            overflow-x: hidden;
        }

        .page {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 14px;
        }

        .app-shell {
            width: 100%;
            max-width: 560px;
            min-height: calc(100vh - 28px);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .hero {
            position: relative;
            overflow: hidden;
            border-radius: 22px;
            padding: 12px 18px;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: #fff;
            box-shadow: var(--shadow);
            animation: fadeUp 0.8s ease both;
        }

        .hero::before,
        .hero::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            pointer-events: none;
        }

        .hero::before {
            width: 180px;
            height: 180px;
            top: -55px;
            left: -40px;
        }

        .hero::after {
            width: 130px;
            height: 130px;
            bottom: -35px;
            right: -25px;
        }

        
        .hero h1 {
            margin: 0;
            font-size: 1.18rem;
            line-height: 1.8;
            font-weight: 800;
            text-align: center;
        }

        .card {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: var(--radius-xl);
            padding: 18px;
            box-shadow: var(--shadow);
            animation: fadeUp 0.85s ease both;
        }

        .card:nth-child(2) { animation-delay: 0.08s; }
        .card:nth-child(3) { animation-delay: 0.16s; }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .icon-wrap {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, rgba(11, 107, 91, 0.12), rgba(200, 169, 107, 0.22));
            color: var(--primary);
            flex-shrink: 0;
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--primary-dark);
        }

        .card-header span {
            display: block;
            color: var(--muted);
            font-size: 0.8rem;
            margin-top: 2px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 10px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.79rem;
            font-weight: 700;
            color: var(--primary-dark);
            padding-right: 4px;
        }

        select {
            width: 100%;
            min-height: 48px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #fff;
            color: var(--text);
            font-family: inherit;
            font-size: 0.96rem;
            font-weight: 600;
            padding: 0 10px;
            outline: none;
            transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
            box-shadow: 0 5px 15px rgba(8, 46, 40, 0.04);
        }

        select:focus {
            border-color: rgba(11, 107, 91, 0.45);
            box-shadow: 0 0 0 4px rgba(11, 107, 91, 0.1);
            transform: translateY(-1px);
        }

        .actions {
            margin-top: 14px;
        }

        button {
            border: none;
            width: 100%;
            min-height: 52px;
            border-radius: 16px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
        }

        button:hover { transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        .btn-main {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            box-shadow: 0 14px 25px rgba(11, 107, 91, 0.22);
        }

        .btn-calc {
            background: linear-gradient(135deg, #d4b57a, #b69149);
            color: #17342d;
            box-shadow: 0 14px 25px rgba(182, 145, 73, 0.22);
        }

        .result-box {
            margin-top: 14px;
            display: none;
            border-radius: 18px;
            padding: 14px;
            background: linear-gradient(135deg, #fffaf0, var(--accent-soft));
            border: 1px solid rgba(200, 169, 107, 0.36);
            color: var(--primary-dark);
            font-weight: 700;
            line-height: 1.8;
            animation: zoomFade .35s ease;
        }

        .result-box strong {
            color: var(--primary);
            font-size: 1.05rem;
        }

        .result-area {
            display: none;
            margin-top: 15px;
            animation: zoomFade .35s ease;
        }

        .stage {
            display: none;
            border-radius: 20px;
            padding: 18px 16px;
            color: #fff;
            font-size: 1.05rem;
            font-weight: 800;
            line-height: 1.9;
            text-align: center;
            box-shadow: 0 12px 24px rgba(0,0,0,0.12);
        }

        .footer {
            text-align: center;
            padding: 6px 8px 2px;
            color: var(--primary-dark);
            animation: fadeUp 1s ease both;
        }

        .footer .name {
            font-weight: 800;
            font-size: 0.95rem;
        }

        .footer .version {
            color: var(--muted);
            font-size: 0.8rem;
            margin-top: 4px;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes zoomFade {
            from {
                opacity: 0;
                transform: scale(0.97);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 420px) {
            .page {
                padding: 10px;
            }

            .app-shell {
                min-height: calc(100vh - 20px);
                gap: 12px;
            }

            .hero {
                padding: 10px 14px;
                border-radius: 18px;
            }

            .hero h1 {
                font-size: 1.02rem;
            }

            .card {
                padding: 16px;
                border-radius: 22px;
            }

            .input-row {
                gap: 8px;
            }

            select {
                min-height: 46px;
                font-size: 0.9rem;
                padding: 0 8px;
            }

            button {
                min-height: 50px;
                font-size: 0.96rem;
            }

            .stage {
                font-size: 0.98rem;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="app-shell">
            <section class="hero">
                <h1>حاسبة أعمار الطلاب المستجدين للعام الدراسي 1448 هـ</h1>
            </section>

            <section class="card">
                <div class="card-header">
                    <div class="icon-wrap">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M8 2V5M16 2V5M3 9H21M5 4H19C20.1046 4 21 4.89543 21 6V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V6C3 4.89543 3.89543 4 5 4Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div>
                        <h2>محول التاريخ الهجري إلى الميلادي</h2>
                        
                    </div>
                </div>

                <div class="input-row">
                    <div class="field">
                        <label for="hDay">اليوم</label>
                        <select id="hDay"></select>
                    </div>
                    <div class="field">
                        <label for="hMonth">الشهر</label>
                        <select id="hMonth"></select>
                    </div>
                    <div class="field">
                        <label for="hYear">السنة</label>
                        <select id="hYear"></select>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn-main" onclick="convertHijri()">تحويل إلى ميلادي وإرسال للحاسبة</button>
                </div>

                <div id="hResult" class="result-box"></div>
            </section>

            <section class="card">
                <div class="card-header">
                    <div class="icon-wrap">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M12 14C15.3137 14 18 11.3137 18 8C18 4.68629 15.3137 2 12 2C8.68629 2 6 4.68629 6 8C6 11.3137 8.68629 14 12 14Z" stroke="currentColor" stroke-width="1.8"/>
                            <path d="M4 21C4.85038 18.1085 7.17792 16 12 16C16.8221 16 19.1496 18.1085 20 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div>
                        <h2>حاسبة الصف المستحق</h2>
                        
                    </div>
                </div>

                <div class="input-row">
                    <div class="field">
                        <label for="gDay">اليوم</label>
                        <select id="gDay"></select>
                    </div>
                    <div class="field">
                        <label for="gMonth">الشهر</label>
                        <select id="gMonth"></select>
                    </div>
                    <div class="field">
                        <label for="gYear">السنة</label>
                        <select id="gYear"></select>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn-calc" onclick="calculate()">احسب الصف المستحق</button>
                </div>

                <div id="resultArea" class="result-area">
                    <div id="stageOutput" class="stage"></div>
                </div>
            </section>

            <div class="footer">
                <div class="name">تصميم أ. خالد محمد الحربي® 2026</div>
                <div class="version">0504509080</div>
                <div class="version">allihaibi@gmail.com</div>
                <div class="version">Version 2.0</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.js"></script>

    <script>
        const hijriMonths = [
            "1 - محرم", "2 - صفر", "3 - ربيع الأول", "4 - ربيع الآخر",
            "5 - جمادى الأولى", "6 - جمادى الآخرة", "7 - رجب", "8 - شعبان",
            "9 - رمضان", "10 - شوال", "11 - ذو القعدة", "12 - ذو الحجة"
        ];

        const gregorianMonths = [
            "1 - يناير", "2 - فبراير", "3 - مارس", "4 - أبريل",
            "5 - مايو", "6 - يونيو", "7 - يوليو", "8 - أغسطس",
            "9 - سبتمبر", "10 - أكتوبر", "11 - نوفمبر", "12 - ديسمبر"
        ];

        window.onload = function () {
            const hDay = document.getElementById("hDay");
            const hMonth = document.getElementById("hMonth");
            const hYear = document.getElementById("hYear");

            const gDay = document.getElementById("gDay");
            const gMonth = document.getElementById("gMonth");
            const gYear = document.getElementById("gYear");

            for (let i = 1; i <= 30; i++) {
                hDay.innerHTML += `<option value="${i}">${i}</option>`;
            }

            hijriMonths.forEach((month, index) => {
                hMonth.innerHTML += `<option value="${index + 1}">${month}</option>`;
            });

            for (let i = 1460; i >= 1390; i--) {
                hYear.innerHTML += `<option value="${i}">${i}</option>`;
            }

            for (let i = 1; i <= 31; i++) {
                gDay.innerHTML += `<option value="${i}">${i}</option>`;
            }

            gregorianMonths.forEach((month, index) => {
                gMonth.innerHTML += `<option value="${index + 1}">${month}</option>`;
            });

            for (let i = 2026; i >= 1995; i--) {
                gYear.innerHTML += `<option value="${i}">${i}</option>`;
            }
        };

        function setGregorianDate(day, month, year) {
            document.getElementById("gDay").value = String(Number(day));
            document.getElementById("gMonth").value = String(Number(month));
            document.getElementById("gYear").value = String(year);
        }

        function showHijriResult(message) {
            const hResult = document.getElementById("hResult");
            hResult.style.display = "block";
            hResult.innerHTML = message;
        }

        function convertHijri() {
            const hDay = document.getElementById("hDay").value;
            const hMonth = document.getElementById("hMonth").value;
            const hYear = document.getElementById("hYear").value;

            const date = moment(`${hYear}/${hMonth}/${hDay}`, "iYYYY/iM/iD");

            if (!date.isValid()) {
                showHijriResult("تعذر تحويل التاريخ الهجري، يرجى التأكد من صحة الإدخال.");
                return;
            }

            const gYear = date.format("YYYY");
            const gMonth = date.format("M");
            const gDay = date.format("D");

            showHijriResult(`التاريخ الميلادي: <strong>${gYear}/${String(gMonth).padStart(2, "0")}/${String(gDay).padStart(2, "0")}</strong>`);

            setGregorianDate(gDay, gMonth, gYear);
            calculate();
        }

        function calculate() {
            const d = parseInt(document.getElementById("gDay").value, 10);
            const m = parseInt(document.getElementById("gMonth").value, 10);
            const y = parseInt(document.getElementById("gYear").value, 10);

            const birth = new Date(y, m - 1, d);
            const target = new Date(2026, 7, 24);

            if (isNaN(birth.getTime())) return;

            let years = target.getFullYear() - birth.getFullYear();
            let months = target.getMonth() - birth.getMonth();
            let days = target.getDate() - birth.getDate();

            if (days < 0) {
                months--;
                days += new Date(target.getFullYear(), target.getMonth(), 0).getDate();
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            const resultArea = document.getElementById("resultArea");
            const stageOut = document.getElementById("stageOutput");

            resultArea.style.display = "block";
            stageOut.style.display = "block";

            let text = "";
            let color = "";

            const primaryLimit = new Date(2020, 7, 24);
            const graceLimitEnd = new Date(2020, 10, 22);
            const kg3End = new Date(2021, 7, 24);
            const kg2Start = new Date(2021, 7, 25);
            const kg2End = new Date(2022, 7, 24);
            const kg1Start = new Date(2022, 7, 25);
            const kg1End = new Date(2023, 7, 24);

            if (birth <= primaryLimit && years < 7) {
                text = "الصف الأول الابتدائي (الفئة الأولى)";
                color = "var(--success)";
            } else if (birth > primaryLimit && birth <= graceLimitEnd) {
                text = "الصف الأول الابتدائي (بشرط الروضة) أو رياض الأطفال (KG3)";
                color = "var(--info)";
            } else if (birth > graceLimitEnd && birth <= kg3End) {
                text = "رياض الأطفال - المستوى الثالث (KG3)";
                color = "var(--kg)";
            } else if (birth >= kg2Start && birth <= kg2End) {
                text = "رياض الأطفال - المستوى الثاني (KG2)";
                color = "var(--kg)";
            } else if (birth >= kg1Start && birth <= kg1End) {
                text = "رياض الأطفال - المستوى الأول (KG1)";
                color = "var(--kg)";
            } else if (years === 7) {
                text = "الصف الثاني الابتدائي";
                color = "var(--success)";
            } else if (years === 8) {
                text = "الصف الثالث الابتدائي";
                color = "var(--success)";
            } else if (years === 9) {
                text = "الصف الرابع الابتدائي";
                color = "var(--success)";
            } else if (years === 10) {
                text = "الصف الخامس الابتدائي";
                color = "var(--success)";
            } else if (years === 11) {
                text = "الصف السادس الابتدائي";
                color = "var(--success)";
            } else if (years === 12) {
                text = "الصف الأول المتوسط";
                color = "var(--middle)";
            } else if (years === 13) {
                text = "الصف الثاني المتوسط";
                color = "var(--middle)";
            } else if (years === 14) {
                text = "الصف الثالث المتوسط";
                color = "var(--middle)";
            } else if (years === 15) {
                text = "الصف الأول الثانوي";
                color = "var(--secondary)";
            } else if (years === 16) {
                text = "الصف الثاني الثانوي";
                color = "var(--secondary)";
            } else if (years >= 17 && years <= 21) {
                text = "الصف الثالث الثانوي";
                color = "var(--secondary)";
            } else if (years < 3) {
                text = "دون سن القبول";
                color = "var(--neutral)";
            } else {
                text = "خارج نطاق السلم التعليمي";
                color = "var(--danger)";
            }

            stageOut.innerText = text;
            stageOut.style.background = `linear-gradient(135deg, ${resolveColor(color)}, ${darkenColor(resolveColor(color))})`;
        }

        function resolveColor(variableName) {
            const temp = document.createElement("div");
            temp.style.color = variableName;
            document.body.appendChild(temp);
            const resolved = getComputedStyle(temp).color;
            document.body.removeChild(temp);
            return resolved;
        }

        function darkenColor(rgb) {
            const values = rgb.match(/\d+/g);
            if (!values) return rgb;
            const [r, g, b] = values.map(Number);
            const darken = (v) => Math.max(0, Math.round(v * 0.78));
            return `rgb(${darken(r)}, ${darken(g)}, ${darken(b)})`;
        }
    </script>
</body>
</html>
